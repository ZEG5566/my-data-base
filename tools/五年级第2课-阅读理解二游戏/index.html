<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>《模糊的世界》阅读理解闯关 · 五年级高华第2课</title>
<style>
:root{
  --bg:#0f1730; --ink:#102a43; --panel:#ffffff;
  --main:#6a5ae0; --main-dark:#4d3fc1; --accent:#ffb84d;
  --ok:#3dd28a; --no:#ef5b5b; --soft:#f3f2ff; --line:#cfc9f5;
  --gold:#f8c23f; --life:#e0476d;
  --hl:#fff2a8;
}
*{box-sizing:border-box}
html,body{margin:0;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:linear-gradient(160deg,#1b2360,#2a2a6e 60%,#4b2e83);color:var(--ink);min-height:100vh}
body{padding:16px 12px 40px}

/* ============ HUD ============ */
.hud{max-width:980px;margin:0 auto 14px;background:rgba(255,255,255,.96);border-radius:16px;padding:12px 16px;display:grid;grid-template-columns:auto 1fr auto auto auto auto;gap:10px;align-items:center;box-shadow:0 6px 24px rgba(0,0,0,.25)}
@media (max-width:720px){.hud{grid-template-columns:auto 1fr;row-gap:6px}}
.mascot{font-size:30px;animation:wave 2s ease-in-out infinite}
@keyframes wave{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.title{font-weight:800;color:var(--main-dark);font-size:17px;line-height:1.2}
.title small{display:block;font-weight:500;color:#666;font-size:12px;margin-top:2px}
.hudbox{display:flex;align-items:center;gap:6px;background:var(--soft);border-radius:999px;padding:6px 12px;font-weight:700;font-size:14px;white-space:nowrap}
.hudbox.gold{background:#fff5d9;color:#a37200}
.hudbox.star{background:#ffe9d6;color:#c05a1a}
.lifebar{position:relative;width:140px;height:14px;background:#eee;border-radius:999px;overflow:hidden}
.lifefill{position:absolute;inset:0;width:100%;background:linear-gradient(90deg,#7cf2b5,#3dd28a);transition:width .4s}
.lifefill.low{background:linear-gradient(90deg,#ffaf7a,var(--life))}
.lifelbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0a2a1a}

/* ============ PROGRESS ============ */
.progress{max-width:980px;margin:0 auto 14px;display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.node{background:rgba(255,255,255,.25);color:#fff;border-radius:10px;padding:8px 4px;text-align:center;font-weight:700;font-size:13px;border:2px solid transparent;cursor:pointer;transition:all .2s}
.node.current{background:var(--accent);color:#3b2a00;border-color:#fff;transform:translateY(-2px)}
.node.done{background:var(--ok);color:#fff}
.node.locked{opacity:.4;cursor:not-allowed}

/* ============ MAIN LAYOUT ============ */
.main{max-width:980px;margin:0 auto;display:grid;grid-template-columns:1.1fr 1fr;gap:14px}
@media (max-width:820px){.main{grid-template-columns:1fr}}
.card{background:var(--panel);border-radius:16px;padding:16px 18px;box-shadow:0 6px 20px rgba(0,0,0,.2)}
.card h2{margin:0 0 8px;color:var(--main-dark);font-size:18px}
.card h3{margin:10px 0 6px;font-size:15px;color:#444}

/* ============ STORY ============ */
.story{max-height:70vh;overflow-y:auto;padding-right:8px;line-height:2.1;font-size:15.5px}
.story p{margin:0 0 10px;text-indent:2em}
.story p.title{text-align:center;text-indent:0;font-weight:800;color:var(--main-dark);font-size:18px;margin-bottom:6px}
.py{position:relative;border-bottom:1.5px dotted var(--main);cursor:help;padding:0 1px}
.py:hover,.py.active{background:var(--hl);border-radius:4px}
.py::after{
  content:attr(data-py) "　" attr(data-m);
  position:absolute;bottom:130%;left:50%;transform:translateX(-50%);
  background:#2a2a6e;color:#fff;padding:5px 10px;border-radius:8px;font-size:13px;
  white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;
  box-shadow:0 4px 10px rgba(0,0,0,.3);z-index:10;
}
.py:hover::after,.py.active::after{opacity:1}
.hl-para{background:#fff9c4;border-radius:6px;padding:4px 6px;animation:flash 1.2s ease}
@keyframes flash{0%{background:#fff176}100%{background:#fff9c4}}

/* ============ QUESTION ============ */
.qhead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.qnum{background:var(--main);color:#fff;padding:3px 10px;border-radius:999px;font-weight:700;font-size:13px}
.points{background:#ffe;color:#7a5a00;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:700}
.qtext{font-weight:700;font-size:16px;line-height:1.5;margin:4px 0 10px}

.toolbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tbtn{padding:6px 10px;border-radius:999px;border:0;background:var(--soft);color:var(--main-dark);font-size:13px;font-weight:700;cursor:pointer}
.tbtn:hover{background:var(--line)}
.tbtn.warn{background:#ffece4;color:#c25a1a}

.hintbox{background:#fffbe8;border-left:4px solid var(--accent);padding:10px 12px;border-radius:8px;margin-bottom:10px;font-size:14px;display:none}
.hintbox.show{display:block}
.hintbox b{color:#a37200}
.refbox{background:#eaf7ef;border-left:4px solid var(--ok);padding:10px 12px;border-radius:8px;margin-bottom:10px;font-size:14px;display:none}
.refbox.show{display:block}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media (max-width:520px){.choices{grid-template-columns:1fr}}
.choice{padding:10px 12px;border:2px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;text-align:left;font-size:14.5px;transition:all .15s}
.choice:hover{border-color:var(--main)}
.choice.sel{background:#f3f2ff;border-color:var(--main)}
.choice.correct{background:#d9f5e6;border-color:var(--ok);color:#0e6b3d}
.choice.wrong{background:#fde0e0;border-color:var(--no);color:#8a2020}
.choice.disabled{cursor:not-allowed;opacity:.85}

.frame{background:#f7f6ff;border-radius:10px;padding:10px 12px;margin:8px 0;line-height:2.1;font-size:15px}
.blank{display:inline-block;min-width:120px;padding:2px 10px;background:#fff;border-bottom:3px solid var(--main);border-radius:4px;text-align:center;font-weight:700;color:var(--main-dark);cursor:pointer;margin:0 2px}
.blank.filled{background:#e8e4ff}
.blank.correct{background:#d9f5e6;border-color:var(--ok);color:#0e6b3d}
.blank.wrong{background:#fde0e0;border-color:var(--no);color:#8a2020}
.wbank{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.wbtn{padding:6px 12px;background:#fff;border:2px solid var(--line);border-radius:999px;font-weight:700;cursor:pointer;font-size:14px}
.wbtn:hover{border-color:var(--main)}
.wbtn.used{opacity:.3;cursor:not-allowed}
.wbtn.sel{outline:3px solid var(--accent)}

.radio-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.radio{padding:8px 14px;border:2px solid var(--line);border-radius:10px;cursor:pointer;background:#fff;font-weight:700}
.radio.sel{background:var(--accent);color:#3b2a00;border-color:var(--accent)}

textarea,input.ti{width:100%;border:2px solid var(--line);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:15px;resize:vertical}
textarea{min-height:50px}
textarea:focus,input.ti:focus{outline:0;border-color:var(--main)}
.tlabel{font-size:13px;color:#666;margin:6px 0 2px;font-weight:700}
.kplist{margin:6px 0 0;padding-left:6px;list-style:none}
.kplist li{margin:3px 0;font-size:14px;font-weight:600}
.kplist li.hit{color:#0e6b3d}
.kplist li.miss{color:#8a2020}

.actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;justify-content:flex-end}
.btn{padding:10px 20px;border:0;border-radius:10px;font-weight:800;cursor:pointer;font-size:15px}
.btn.primary{background:var(--main);color:#fff}
.btn.primary:hover{background:var(--main-dark)}
.btn.ghost{background:#fff;color:var(--main-dark);border:2px solid var(--main)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.fb{margin-top:10px;padding:10px 12px;border-radius:10px;font-weight:700;display:none}
.fb.show{display:block}
.fb.ok{background:#d9f5e6;color:#0e6b3d;border:2px solid var(--ok)}
.fb.no{background:#fde0e0;color:#8a2020;border:2px solid var(--no)}

/* ============ VICTORY ============ */
.victory{position:fixed;inset:0;background:rgba(10,10,40,.85);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.victory.show{display:flex}
.cert{background:#fff8e7;border:8px double #c89d3a;border-radius:18px;padding:30px 24px;max-width:460px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:pop .5s ease}
@keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.cert h1{margin:0 0 6px;color:#8b5a00;font-size:26px}
.cert .medal{font-size:70px;margin:10px 0}
.cert p{margin:6px 0;color:#5a4000;font-size:15px;line-height:1.6}
.cert .stars{font-size:28px;color:var(--gold);margin:6px 0}

/* floating +coin */
.float{position:fixed;pointer-events:none;font-weight:800;font-size:22px;animation:flyup 1s ease-out forwards;z-index:50}
@keyframes flyup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* ============ mini-game overlay ============ */
.miniBtn{cursor:pointer;background:linear-gradient(135deg,#ffb6d5,#ffdfa6)!important;color:#8a2a55!important;border:0;font-weight:800;animation:wobble 3s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
.miniOverlay{position:fixed;inset:0;background:rgba(10,10,40,.85);display:flex;align-items:center;justify-content:center;z-index:90;padding:16px}
.miniCard{background:#fff;border-radius:18px;padding:20px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.miniCard h2{margin:0 0 6px;color:var(--main-dark);text-align:center}
.miniRule{color:#555;font-size:13.5px;text-align:center;margin:0 0 10px;line-height:1.6}
.miniHud{display:flex;justify-content:space-around;background:#f3f2ff;border-radius:10px;padding:8px;font-size:14px;font-weight:700;margin-bottom:10px}
.miniStage{position:relative;height:320px;background:linear-gradient(180deg,#d8eeff,#eaf6ff);border-radius:12px;overflow:hidden;border:2px solid var(--line)}
.bubble{position:absolute;width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:36px;border-radius:50%;background:#fff;box-shadow:0 4px 10px rgba(0,0,0,.2);cursor:pointer;animation:bubblepop 2.6s ease-out forwards;user-select:none}
@keyframes bubblepop{
  0%{transform:scale(0);opacity:0}
  15%{transform:scale(1.15);opacity:1}
  25%{transform:scale(1)}
  90%{transform:scale(1);opacity:1}
  100%{transform:scale(.6);opacity:0}
}
.bubble.clicked{animation:pop .25s ease forwards!important}
@keyframes pop{0%{transform:scale(1)}100%{transform:scale(1.8);opacity:0}}
.miniActions{display:flex;gap:10px;justify-content:center;margin-top:10px}
.miniResult{text-align:center;padding:10px;margin-top:10px;background:#fff4d9;border-radius:10px;font-weight:700;display:none}
.miniResult.show{display:block}

/* floating bonus drift */
.floatBonus{position:fixed;font-size:38px;cursor:pointer;z-index:40;user-select:none;filter:drop-shadow(0 4px 10px rgba(255,255,255,.5));animation:drift 9s linear forwards}
@keyframes drift{
  0%{transform:translateX(0) translateY(0) rotate(0);opacity:0}
  8%{opacity:1}
  100%{transform:translateX(calc(100vw + 60px)) translateY(-40px) rotate(360deg);opacity:0}
}

/* streak banner */
.streak{position:fixed;top:30%;left:50%;transform:translateX(-50%);font-size:44px;font-weight:900;color:#ffb84d;text-shadow:0 4px 14px rgba(0,0,0,.6),0 0 20px #ffb84d;pointer-events:none;z-index:80;animation:streakpop 1.3s ease forwards;white-space:nowrap}
@keyframes streakpop{
  0%{transform:translate(-50%,10px) scale(.3);opacity:0}
  30%{transform:translate(-50%,0) scale(1.3);opacity:1}
  70%{transform:translate(-50%,0) scale(1);opacity:1}
  100%{transform:translate(-50%,-30px) scale(1);opacity:0}
}
</style>
</head>
<body>

<!-- HUD -->
<div class="hud">
  <div class="mascot" title="小眼睛陪你闯关！">👁️</div>
  <div class="title">《模糊的世界》阅读理解闯关
    <small>五年级高华 第2课 · 每关都有 📍定位 💡提示 👀答案 支架</small>
  </div>
  <button class="hudbox miniBtn" id="miniBtn" title="玩一局护眼小游戏">🎮 小游戏</button>
  <div class="hudbox gold">🪙 <span id="coin">0</span></div>
  <div class="hudbox star">⭐ <span id="star">0</span>/9</div>
  <div class="hudbox">
    <span style="font-size:13px">视力</span>
    <div class="lifebar"><div class="lifefill" id="lifefill"></div><div class="lifelbl" id="lifelbl">100</div></div>
  </div>
</div>

<!-- Progress -->
<div class="progress" id="nodes"></div>

<!-- Main -->
<div class="main">
  <div class="card">
    <h2>📖 短文</h2>
    <div class="story" id="story"></div>
  </div>

  <div class="card">
    <div id="qbody"></div>
  </div>
</div>

<!-- Victory modal -->
<div class="victory" id="victory">
  <div class="cert">
    <h1>🏆 护眼小英雄</h1>
    <div class="medal" id="medal">🥇</div>
    <p id="certLine">恭喜你完成《模糊的世界》阅读理解闯关！</p>
    <div class="stars" id="certStars">⭐⭐⭐⭐⭐⭐⭐</div>
    <p>🪙 金币：<b id="certCoin">0</b>　·　👁️ 最终视力：<b id="certLife">100</b></p>
    <p id="certRank" style="font-size:18px;font-weight:800;color:#8b5a00;margin-top:10px"></p>
    <button class="btn primary" onclick="document.getElementById('victory').classList.remove('show')">继续欣赏</button>
    <button class="btn ghost" onclick="location.reload()" style="margin-left:8px">重新挑战</button>
  </div>
</div>

<script>
/* ============ 难词拼音词典 ============ */
const DICT = {
  '模糊':['mó hu','看不清楚'],
  '目不转睛':['mù bù zhuǎn jīng','一直盯着看'],
  '屏幕':['píng mù','电脑、手机的画面'],
  '三更半夜':['sān gēng bàn yè','深夜'],
  '无精打采':['wú jīng dǎ cǎi','没有精神'],
  '打哈欠':['dǎ hā qian','想睡觉时张嘴吐气'],
  '黑板':['hēi bǎn','教室里写字的板'],
  '咳嗽':['ké sou','喉咙发出声音'],
  '组屋':['zǔ wū','政府组屋'],
  '诊所':['zhěn suǒ','看病的地方'],
  '常客':['cháng kè','经常去的人'],
  '巴刹':['bā shā','菜市场'],
  '挣脱':['zhèng tuō','用力把手甩开'],
  '摩托车':['mó tuō chē','motorbike'],
  '刹住':['shā zhù','紧急停下'],
  '愣':['lèng','呆住、反应不过来'],
  '冰凉':['bīng liáng','非常冷'],
  '皱着眉头':['zhòu zhe méi tóu','眉毛皱起来，表情不高兴'],
  '度数':['dù shù','近视的深浅'],
  '视力':['shì lì','眼睛看东西的能力'],
  '下降':['xià jiàng','变差、变低'],
  '翻开':['fān kāi','打开书本'],
  '跳动':['tiào dòng','不停地动'],
  '抛':['pāo','扔出去'],
  '抽屉':['chōu ti','桌子的格子'],
  '复查':['fù chá','再检查一次'],
  '稳定':['wěn dìng','不变动'],
  '清清楚楚':['qīng qīng chǔ chǔ','非常清楚'],
  '上瘾':['shàng yǐn','停不下来，离不开'],
};

/* ============ 短文（按段落） ============ */
const STORY = [
  {title:true, text:'模糊的世界'},
  {id:'p1', text:'志强最近迷上了一款手机游戏。从学校回到家，他一放下书包，就窝在沙发上，目不转睛地盯着屏幕。妈妈劝他休息，他嘴上答应，手指却不肯停。晚上，他关了灯躲在被窝里继续玩，常常玩到三更半夜。'},
  {id:'p2', text:'才过了三个月，他整天无精打采，上课不停地打哈欠，功课也越做越差。更糟糕的是，他看黑板上的字越来越模糊，一读书就头疼、咳嗽，成了组屋楼下那家诊所的常客。'},
  {id:'p3', text:'这个周六早上，妈妈让志强带七岁的妹妹佳佳到楼下的巴刹买水果。志强一手牵着佳佳，一手还在划手机。走到巴刹前的马路边，佳佳忽然挣脱他的手，跑向对面一只小猫。一辆摩托车"呼"地一下从前方冲了过来——'},
  {id:'p4', text:'"佳佳！"志强猛地抬头，眼前一片模糊，只看见一个灰影从妹妹身边擦过。他的手在发抖，手机"啪"地一声掉在地上。还好，摩托车及时刹住了，佳佳吓得哇哇大哭。'},
  {id:'p5', text:'志强愣在原地，半天说不出话。回家的路上，妈妈一句话也没说，只是紧紧地握着他的手。那只手冰凉冰凉的。'},
  {id:'p6', text:'下午，妈妈带志强去陈医生的诊所。陈医生看过他的眼睛，皱着眉头说："度数又加深了。再这样下去，视力还会继续下降。"回家时，妈妈把他的手机轻轻地放在桌上，说："你自己决定吧。"'},
  {id:'p7', text:'那天晚上，志强坐在书桌前，翻开课本，书上的字一个个都在跳动。他想起佳佳那声哭喊，想起妈妈冰凉的手，心里一阵痛苦。他站起来，走到客厅，把手机抛进抽屉，"咔"地一声锁上。'},
  {id:'p8', text:'从那天起，志强每天只在做完功课后玩二十分钟电脑，一到九点就上床睡觉。每个星期六，他都陪佳佳到公园跑步。几个月后，他再去找陈医生复查时，陈医生笑着说："视力稳定了，你终于听进去了。"志强转过头，看见妈妈正站在诊所门口，对着他轻轻地笑。'},
  {id:'p9', text:'那一刻，他眼中的世界，清清楚楚。'}
];

function annotate(text){
  // 按词长降序，避免短词先被切
  const keys = Object.keys(DICT).sort((a,b)=>b.length-a.length);
  let out = text;
  keys.forEach(w=>{
    const re = new RegExp(w,'g');
    out = out.replace(re, `<span class="py" data-py="${DICT[w][0]}" data-m="${DICT[w][1]}">${w}</span>`);
  });
  return out;
}
function renderStory(){
  const box = document.getElementById('story');
  box.innerHTML = STORY.map(p=>{
    if(p.title) return `<p class="title">${p.text}</p>`;
    return `<p id="${p.id}">${annotate(p.text)}</p>`;
  }).join('');
  // 手机点击 toggle
  box.querySelectorAll('.py').forEach(el=>{
    el.addEventListener('click',()=>{
      box.querySelectorAll('.py').forEach(x=>{ if(x!==el) x.classList.remove('active');});
      el.classList.toggle('active');
    });
  });
}
renderStory();

function highlightPara(id){
  const p = document.getElementById(id);
  if(!p) return;
  p.classList.remove('hl-para'); void p.offsetWidth;
  p.classList.add('hl-para');
  p.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ============ 游戏状态 ============ */
const state = { coin:0, star:0, life:100, level:0, stars:[] };

function updHud(){
  document.getElementById('coin').textContent = state.coin;
  document.getElementById('star').textContent = state.star;
  const lf = document.getElementById('lifefill');
  lf.style.width = Math.max(0,state.life)+'%';
  lf.classList.toggle('low', state.life<40);
  document.getElementById('lifelbl').textContent = Math.max(0,state.life);
}
function addCoin(n,ev){
  state.coin += n; updHud();
  if(ev){
    const f = document.createElement('div');
    f.className='float'; f.textContent = (n>0?'+':'')+n+' 🪙';
    f.style.color = n>0?'#f8c23f':'#ef5b5b';
    f.style.left = (ev.clientX||window.innerWidth/2)+'px';
    f.style.top = (ev.clientY||100)+'px';
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
  }
}

/* ============ 渲染节点进度 ============ */
function renderNodes(){
  const box = document.getElementById('nodes');
  box.innerHTML = LEVELS.map((L,i)=>{
    let cls='node';
    if(i===state.level) cls+=' current';
    else if(state.stars[i]) cls+=' done';
    else if(i>state.level) cls+=' locked';
    return `<div class="${cls}" data-i="${i}">${L.id}${state.stars[i]?' ✓':''}</div>`;
  }).join('');
  box.querySelectorAll('.node').forEach(n=>{
    n.onclick = ()=>{
      const i=+n.dataset.i;
      if(i<=state.level || state.stars[i]){ state.level=i; renderAll(); }
    };
  });
}

/* ============ 关键词评分 ============ */
function scoreText(text, keyPoints){
  const t = (text||'').trim();
  const hit=[], miss=[];
  keyPoints.forEach(kp=>{
    const got = kp.any.some(k=>t.includes(k));
    (got?hit:miss).push(kp);
  });
  return {hit, miss, ok:miss.length===0};
}
function kpHtml(r){
  const h = r.hit.map(k=>`<li class="hit">✓ ${k.label}</li>`).join('');
  const m = r.miss.map(k=>`<li class="miss">✗ ${k.label}</li>`).join('');
  return `<ul class="kplist">${h}${m}</ul>`;
}
function getVal(id){ return (document.getElementById(id).value||'').trim(); }

/* ============ 事件绑定 ============ */
function bindHandlers(L){
  const btn = document.getElementById('checkBtn');

  if(L.type==='exact'){
    btn.onclick = (ev)=>{
      const t = getVal('ans');
      if(!t){ feedback(false,'请先写出你的答案～'); return; }
      if(t.includes(L.answer)){
        feedback(true, `正确！文中的词是「${L.answer}」。`);
        awardStar(ev);
      }else{
        feedback(false, `还不对哦，再读读原文找找看，只写一个词语即可。`);
        addLife(-5); updHud();
      }
    };
  }
  else if(L.type==='input'){
    btn.onclick = (ev)=>{
      const t = getVal('ans');
      if(t.length<5){ feedback(false,'请写出你的完整答案（至少一句话）。'); return; }
      const r = scoreText(t, L.keyPoints);
      if(r.ok){
        feedback(true, `答题要点齐全！🎉${kpHtml(r)}`);
        awardStar(ev, state.level===LEVELS.length-1);
      }else{
        feedback(false, `你答对了 ${r.hit.length} / ${L.keyPoints.length} 个要点，还缺 ${r.miss.length} 点：${kpHtml(r)}`);
        addLife(-5); updHud();
      }
    };
  }
  else if(L.type==='twoInput'){
    btn.onclick = (ev)=>{
      const t1 = getVal('ans1'), t2 = getVal('ans2');
      if(t1.length<3 || t2.length<3){ feedback(false,'两部分都要写答案哦～'); return; }
      const r1 = scoreText(t1, L.part1.keyPoints);
      const r2 = scoreText(t2, L.part2.keyPoints);
      const total = L.part1.keyPoints.length + L.part2.keyPoints.length;
      const got = r1.hit.length + r2.hit.length;
      if(r1.ok && r2.ok){
        feedback(true, `两部分都完整！🎉<br><b>① 反应</b>${kpHtml(r1)}<b>② 原因</b>${kpHtml(r2)}`);
        awardStar(ev);
      }else{
        feedback(false, `答对 ${got} / ${total} 个要点：<br><b>① </b>${kpHtml(r1)}<b>② </b>${kpHtml(r2)}`);
        addLife(-5); updHud();
      }
    };
  }
  else if(L.type==='opinion'){
    btn.onclick = (ev)=>{
      const problems=[], reports=[];
      let allOk = true;

      L.fields.forEach(f=>{
        const t = getVal(f.id);
        if(f.must){
          if(!t){ allOk=false; problems.push(`${f.label} 还没填。`); return; }
          const ok = f.must.some(m=>t.includes(m));
          if(!ok){ allOk=false; problems.push(`${f.label} 请明确写"赞成"或"不赞成"。`); }
        } else if(f.keyPoints){
          if(t.length<5){ allOk=false; problems.push(`${f.label} 还需要多写一点（至少一句话）。`); return; }
          const r = scoreText(t, f.keyPoints);
          const need = f.needHits || f.keyPoints.length;
          reports.push(`<b>${f.label}</b>${kpHtml(r)}`);
          if(r.hit.length < need){
            allOk=false;
            problems.push(`${f.label} 至少要命中 ${need} 个要点（目前 ${r.hit.length}）。`);
          }
        }
      });

      if(allOk){
        feedback(true, `立场、理由、生活迁移全部完成！最终闯关成功！🏆<br>${reports.join('')}`);
        awardStar(ev, true);
      }else{
        feedback(false, `还差一点：<br>• ${problems.join('<br>• ')}${reports.length?'<br>'+reports.join(''):''}`);
        addLife(-5); updHud();
      }
    };
  }
}

/* ============ 反馈 & 通关 ============ */
function feedback(ok,msg){
  const fb = document.getElementById('fb');
  fb.className = 'fb show '+(ok?'ok':'no');
  fb.innerHTML = msg;
}
function awardStar(ev, final){
  if(state.stars[state.level]) return;
  state.stars[state.level] = true;
  state.star++;
  const coins = LEVELS[state.level].points * 10;
  addCoin(coins,ev);
  addLife(+5);
  updHud();
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').onclick = ()=>{
    if(state.level<LEVELS.length-1){ state.level++; renderAll(); }
    else{ showVictory(); }
  };
  renderNodes();
  if(final) setTimeout(showVictory,600);
}

function showVictory(){
  document.getElementById('certCoin').textContent = state.coin;
  document.getElementById('certLife').textContent = Math.max(0,state.life);
  document.getElementById('certStars').textContent = '⭐'.repeat(state.star);

  else if(state.life>=60){rank='🌟 银牌阅读小达人 🌟';medal='🥈';}
  else{rank='💪 铜牌闯关者（再挑战一次会更好！）';medal='🥉';}
  document.getElementById('medal').textContent = medal;
  document.getElementById('certRank').textContent = rank;
  document.getElementById('victory').classList.add('show');
}

    const r = overlay.querySelector('#miR');
    const msg = coins>=80 ? '🏆 太棒了！' : coins>=40 ? '👍 不错！' : coins>=0 ? '🙂 继续努力' : '😅 下次小心陷阱';
    r.innerHTML = `🏁 结束！${msg}<br>获得 🪙 <b>${coins}</b> 金币，视力 <b>${lifeGain>=0?'+':''}${lifeGain}</b>`;
    r.classList.add('show');
    overlay.querySelector('#miStart').disabled=false;
    overlay.querySelector('#miStart').textContent='再玩一局';
  };
  const start=()=>{
    running=true; timeLeft=20; coins=0; lifeGain=0; upd();
    overlay.querySelector('#miR').classList.remove('show');
    stage.innerHTML='';
    overlay.querySelector('#miStart').disabled=true;
    spawner = setInterval(spawn, 450);
    timer = setInterval(()=>{ timeLeft--; upd(); if(timeLeft<=0) stop(); },1000);
  };
  overlay.querySelector('#miStart').onclick = start;
  overlay.querySelector('#miClose').onclick = ()=>{
    running=false; clearInterval(spawner); clearInterval(timer);
    overlay.remove();
  };
}

/* ============ 闯关内嵌的休闲小游戏 ============ */
function runInlineMini(L){
  const stage = document.getElementById('miStage');
  const tEl = document.getElementById('miT');
  const cEl = document.getElementById('miC');
  const lEl = document.getElementById('miL');
  let timeLeft = L.duration, coins = 0, lifeGain = 0, running = true, sp, tm;
  const upd = ()=>{
    tEl.textContent = timeLeft;
    cEl.textContent = coins;
    lEl.textContent = (lifeGain>=0?'+':'')+lifeGain;
  };
  upd();
  stage.innerHTML = '';
  document.getElementById('miR').classList.remove('show');
  document.getElementById('startMini').disabled = true;
  document.getElementById('startMini').textContent = '进行中…';

  const spawn = ()=>{
    if(!running) return;
    const typ = L.pool[Math.floor(Math.random()*L.pool.length)];
    const b = document.createElement('div');
    b.className = 'bubble'; b.textContent = typ.e;
    b.style.left = Math.random()*(stage.clientWidth-70)+'px';
    b.style.top = Math.random()*(stage.clientHeight-80)+10+'px';
    b.onclick = (ev)=>{
      if(b.dataset.done) return;
      b.dataset.done='1';
      coins += typ.coin; lifeGain += typ.life;
      b.classList.add('clicked');
      const fx = document.createElement('div');
      fx.className='float';
      fx.textContent = (typ.coin>0?'+':'')+typ.coin+' 🪙';
      fx.style.color = typ.good?'#f8c23f':'#ef5b5b';
      fx.style.left = ev.clientX+'px';
      fx.style.top = ev.clientY+'px';
      document.body.appendChild(fx);
      setTimeout(()=>fx.remove(),1000);
      upd();
      setTimeout(()=>b.remove(),260);
    };
    stage.appendChild(b);
    setTimeout(()=>b.remove(),2700);
  };
  sp = setInterval(spawn, L.spawnMs||500);
  tm = setInterval(()=>{
    timeLeft--; upd();
    if(timeLeft<=0){
      running = false; clearInterval(sp); clearInterval(tm);
      stage.innerHTML = '';
      state.coin += coins; addLife(lifeGain); updHud();
      const r = document.getElementById('miR');
      const msg = coins>=60 ? '🏆 太棒了！' : coins>=30 ? '👍 不错！' : coins>=0 ? '🙂 继续努力' : '😅 下次小心陷阱';
      r.innerHTML = `🏁 ${msg}<br>获得 🪙 <b>${coins}</b> 金币，视力 <b>${lifeGain>=0?'+':''}${lifeGain}</b>`;
      r.classList.add('show');
      // 解锁下一关
      if(!state.stars[state.level]){
        state.stars[state.level] = true;
        state.star++;
      }
      updHud(); renderNodes();
      document.getElementById('nextBtn').disabled = false;
      document.getElementById('nextBtn').onclick = ()=>{
        if(state.level<LEVELS.length-1){ state.level++; renderAll(); }
        else { showVictory(); }
      };
    }
  }, 1000);
}

/* ============ 连击横幅 ============ */
let comboCount = 0;
function flashStreak(msg){
  const s = document.createElement('div');
  s.className='streak'; s.textContent=msg;
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1300);
}
const _origAward = awardStar;
awardStar = function(ev, final){
  const wasNew = !state.stars[state.level];
  _origAward(ev, final);
  if(wasNew){
    comboCount++;
    const msgs = ['', '⭐ 答对！', '🔥 连击 ×2！', '💥 三连击！', '🌟 四连击！', '🏆 五连击！', '👑 六连击！', '✨ 全连击神！'];
    flashStreak(msgs[Math.min(comboCount, msgs.length-1)]);
  }
};

/* ============ 启动 ============ */
function renderAll(){ renderNodes(); renderQ(); updHud(); }
renderAll();
</script>
